<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="soum-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
    </radialGradient>
    <filter id="soum-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Deep Background Glow -->
  <circle cx="100" cy="100" r="95" fill="url(#soum-glow)" />
  
  <!-- Outer faint ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4facfe" stroke-width="2" stroke-dasharray="4 8" opacity="0.6" />
  
  <!-- Main thick glowing cyan ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#00f2fe" stroke-width="6" opacity="1" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="#4facfe" stroke-width="12" opacity="0.4" filter="url(#soum-blur)" />
  
  <!-- Chunky Top-Left Cyan Arc -->
  <path d="M 35 50 A 90 90 0 0 1 75 18" fill="none" stroke="#00f2fe" stroke-width="14" opacity="0.8" stroke-linecap="butt" />

  <!-- Orange accent segment (Top-Left inner) -->
  <path d="M 45 60 A 70 70 0 0 1 80 32" fill="none" stroke="#f97316" stroke-width="12" opacity="1" stroke-dasharray="10 2" />
  <path d="M 45 60 A 70 70 0 0 1 80 32" fill="none" stroke="#f97316" stroke-width="16" opacity="0.4" filter="url(#soum-blur)" />
  
  <!-- Dashed inner tracking ring -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#00f2fe" stroke-width="8" stroke-dasharray="20 5" opacity="0.9" />
  
  <!-- Inner solid boundary ring -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#4facfe" stroke-width="4" opacity="0.8" />
</svg>